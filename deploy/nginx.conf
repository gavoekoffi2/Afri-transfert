# ----------------------------------------------------------------------------
# AfriTransfer — Reverse proxy Nginx (exemple production)
# Terminaison TLS via Let's Encrypt (certbot --nginx).
# ----------------------------------------------------------------------------

# --- API ---
server {
    listen 80;
    server_name api.afritransfer.africa;

    # Redirection HTTPS (gérée par certbot après émission du certificat)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # IMPORTANT : ne pas mettre en mémoire tampon ni altérer le corps
        # des webhooks (vérification de signature HMAC sur le corps brut).
        proxy_request_buffering off;
    }

    client_max_body_size 10m;
}

# --- Frontend (Next.js) ---
server {
    listen 80;
    server_name app.afritransfer.africa;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
